name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Push env vars into Vercel project
        run: |
          # Remove stale values (safe to fail if they don't exist yet)
          vercel env rm VITE_SUPABASE_URL production --yes --token "$VERCEL_TOKEN" 2>/dev/null || true
          vercel env rm VITE_SUPABASE_ANON_KEY production --yes --token "$VERCEL_TOKEN" 2>/dev/null || true
          vercel env rm ANTHROPIC_API_KEY production --yes --token "$VERCEL_TOKEN" 2>/dev/null || true

          # Write current values
          echo "$VITE_SUPABASE_URL"    | vercel env add VITE_SUPABASE_URL    production --token "$VERCEL_TOKEN"
          echo "$VITE_SUPABASE_ANON_KEY" | vercel env add VITE_SUPABASE_ANON_KEY production --token "$VERCEL_TOKEN"
          echo "$ANTHROPIC_API_KEY"    | vercel env add ANTHROPIC_API_KEY    production --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy to Vercel Production
        run: vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
